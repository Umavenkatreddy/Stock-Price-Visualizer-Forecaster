name: CI Pipeline
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:

      # ── 1. Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Detect project type ──
      - name: Detect project type
        id: detect
        run: |
          echo "══════════════════════════════════════"
          echo "PROJECT TYPE DETECTION"
          echo "══════════════════════════════════════"

          HAS_PYTHON="false"
          HAS_JAVA="false"

          # Python detection
          if find . -maxdepth 3 -name "*.py" | grep -q .; then
            HAS_PYTHON="true"
            echo "✓ Python files detected"
            PYTHON_FILES=$(find . -maxdepth 3 -name "*.py" | wc -l)
            echo "  Found $PYTHON_FILES .py files"
          fi

          # Java detection
          if [ -f "pom.xml" ] || [ -f "build.gradle" ] || find . -maxdepth 3 -name "*.java" | grep -q .; then
            HAS_JAVA="true"
            echo "✓ Java project detected"
            if [ -f "pom.xml" ]; then
              echo "  Build tool: Maven"
              echo "java_build=maven" >> "$GITHUB_OUTPUT"
            elif [ -f "build.gradle" ]; then
              echo "  Build tool: Gradle"
              echo "java_build=gradle" >> "$GITHUB_OUTPUT"
            fi
          fi

          if [ "$HAS_PYTHON" = "false" ] && [ "$HAS_JAVA" = "false" ]; then
            echo "⚠ No Python or Java files detected"
          fi

          echo "has_python=$HAS_PYTHON" >> "$GITHUB_OUTPUT"
          echo "has_java=$HAS_JAVA" >> "$GITHUB_OUTPUT"

          # Priority: Python first when both exist
          if [ "$HAS_PYTHON" = "true" ]; then
            echo "primary=python" >> "$GITHUB_OUTPUT"
            echo "──────────────────────────────────────"
            echo "PRIMARY: Python (prioritized)"
          elif [ "$HAS_JAVA" = "true" ]; then
            echo "primary=java" >> "$GITHUB_OUTPUT"
            echo "──────────────────────────────────────"
            echo "PRIMARY: Java"
          else
            echo "primary=none" >> "$GITHUB_OUTPUT"
          fi
          echo "══════════════════════════════════════"

      # ══════════════════════════════════════
      # PYTHON PIPELINE
      # ══════════════════════════════════════

      - name: "[Python] Setup Python"
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "[Python] Install dependencies"
        if: steps.detect.outputs.has_python == 'true'
        run: |
          echo "══════════════════════════════════════"
          echo "PYTHON: INSTALL DEPENDENCIES"
          echo "══════════════════════════════════════"

          python -m pip install --upgrade pip

          if [ -f "requirements.txt" ]; then
            echo "Installing from requirements.txt..."
            pip install -r requirements.txt
            echo "✓ requirements.txt installed"
          elif [ -f "setup.py" ]; then
            echo "Installing from setup.py..."
            pip install -e .
            echo "✓ setup.py installed"
          elif [ -f "pyproject.toml" ]; then
            echo "Installing from pyproject.toml..."
            pip install -e .
            echo "✓ pyproject.toml installed"
          else
            echo "⚠ No requirements.txt, setup.py, or pyproject.toml found"
            echo "  Installing common dependencies for linting/testing..."
          fi

          # Always install lint + test tools
          pip install flake8 pytest
          echo "✓ flake8 and pytest installed"

      - name: "[Python] Lint with flake8"
        if: steps.detect.outputs.has_python == 'true'
        run: |
          echo "══════════════════════════════════════"
          echo "PYTHON: LINT (flake8)"
          echo "══════════════════════════════════════"
          echo ""
          echo "Configuration: max-line-length=120, show-source, statistics"
          echo "──────────────────────────────────────"

          # First pass: syntax errors and undefined names (always fatal)
          echo ""
          echo "[PASS 1] Critical errors (syntax, undefined names):"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,venv,.venv,node_modules,build,dist || {
            echo ""
            echo "══════════════════════════════════════"
            echo "LINT FAILURE: Critical Python syntax errors found"
            echo "See above for file:line:column and error code"
            echo "══════════════════════════════════════"
            exit 1
          }
          echo "✓ No critical errors"

          # Second pass: style warnings (fail on high count)
          echo ""
          echo "[PASS 2] Style warnings (max-line-length=120):"
          flake8 . --count --max-line-length=120 --show-source --statistics \
            --exclude=.git,__pycache__,venv,.venv,node_modules,build,dist || {
            echo ""
            echo "══════════════════════════════════════"
            echo "LINT FAILURE: Style violations found"
            echo "Format: file:line:column: CODE message"
            echo "Fix the violations shown above"
            echo "══════════════════════════════════════"
            exit 1
          }
          echo "✓ Lint passed"

      - name: "[Python] Run tests with pytest"
        if: steps.detect.outputs.has_python == 'true'
        run: |
          echo "══════════════════════════════════════"
          echo "PYTHON: TESTS (pytest)"
          echo "══════════════════════════════════════"

          # Find test files
          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" | grep -v __pycache__ | grep -v venv || true)

          if [ -z "$TEST_FILES" ]; then
            echo "⚠ No test files found (test_*.py or *_test.py)"
            echo "  Skipping test execution"
            exit 0
          fi

          echo "Found test files:"
          echo "$TEST_FILES" | sed 's/^/  /'
          echo "──────────────────────────────────────"
          echo ""

          # Run pytest with verbose output for clear failure messages
          pytest -v --tb=short --no-header -q 2>&1 || {
            EXIT_CODE=$?
            echo ""
            echo "══════════════════════════════════════"
            echo "TEST FAILURE: pytest exited with code $EXIT_CODE"
            echo "See above for:"
            echo "  - Test name (FAILED line)"
            echo "  - File and line number"
            echo "  - Expected vs actual values"
            echo "══════════════════════════════════════"
            exit $EXIT_CODE
          }
          echo ""
          echo "✓ All tests passed"

      # ══════════════════════════════════════
      # JAVA PIPELINE
      # ══════════════════════════════════════

      - name: "[Java] Setup JDK"
        if: steps.detect.outputs.has_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: "[Java] Build with Maven"
        if: steps.detect.outputs.has_java == 'true' && steps.detect.outputs.java_build == 'maven'
        run: |
          echo "══════════════════════════════════════"
          echo "JAVA: MAVEN BUILD"
          echo "══════════════════════════════════════"

          mvn clean verify \
            --batch-mode \
            --no-transfer-progress \
            -Dmaven.test.failure.ignore=false \
            -Dorg.slf4j.simpleLogger.showDateTime=true \
            -Dorg.slf4j.simpleLogger.dateTimeFormat="HH:mm:ss" 2>&1 || {
            EXIT_CODE=$?
            echo ""
            echo "══════════════════════════════════════"
            echo "BUILD FAILURE: Maven exited with code $EXIT_CODE"
            echo "Check above for:"
            echo "  - [ERROR] lines with file:line references"
            echo "  - 'cannot find symbol' or 'incompatible types'"
            echo "  - Test failures (Tests run: X, Failures: Y)"
            echo "══════════════════════════════════════"
            exit $EXIT_CODE
          }
          echo ""
          echo "✓ Maven build successful"

      - name: "[Java] Build with Gradle"
        if: steps.detect.outputs.has_java == 'true' && steps.detect.outputs.java_build == 'gradle'
        run: |
          echo "══════════════════════════════════════"
          echo "JAVA: GRADLE BUILD"
          echo "══════════════════════════════════════"

          ./gradlew clean build \
            --no-daemon \
            --console=plain \
            --stacktrace 2>&1 || {
            EXIT_CODE=$?
            echo ""
            echo "══════════════════════════════════════"
            echo "BUILD FAILURE: Gradle exited with code $EXIT_CODE"
            echo "Check above for compilation or test errors"
            echo "══════════════════════════════════════"
            exit $EXIT_CODE
          }
          echo ""
          echo "✓ Gradle build successful"

      # ══════════════════════════════════════
      # SUMMARY
      # ══════════════════════════════════════

      - name: Pipeline summary
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════"
          echo "PIPELINE SUMMARY"
          echo "══════════════════════════════════════"
          echo "  Project type: ${{ steps.detect.outputs.primary }}"
          echo "  Python: ${{ steps.detect.outputs.has_python }}"
          echo "  Java: ${{ steps.detect.outputs.has_java }}"
          echo "══════════════════════════════════════"
