name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  ARTIFACT_NAME: stock-wheel
  COVERAGE_THRESHOLD: 70

jobs:
  init:
    name: "Stage 1 - Init"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      branch: ${{ steps.meta.outputs.branch }}
      is_main: ${{ steps.meta.outputs.is_main }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Collect pipeline metadata
        id: meta
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          IS_MAIN="false"
          if [[ "$BRANCH" == "main" ]]; then IS_MAIN="true"; fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "is_main=$IS_MAIN" >> "$GITHUB_OUTPUT"

      - name: Validate required files
        run: |
          for f in requirements.txt setup.py setup.cfg locustfile.py; do
            [[ -f "$f" ]] && echo "OK: $f" || { echo "MISSING: $f"; exit 1; }
          done

  build:
    name: "Stage 2 - Build"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: init
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip check
      - run: flake8 Stock/ --max-line-length=120 --extend-ignore=E501,W503
      - name: Build wheel
        run: |
          pip install --upgrade build wheel setuptools
          python -m build --wheel --outdir dist/
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/*.whl
          retention-days: 7
